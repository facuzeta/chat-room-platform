services: 

  websockets: 
    image: chat-room-image:latest
    command: daphne -b 0.0.0.0 -p 8001 mysite.asgi:application
    ports:
      - 8001:8001
    depends_on:
      - redis

  celery:
    image: chat-room-image:latest
    command: celery -A mysite worker --loglevel=INFO
    depends_on:
      - redis

  web:
    image: chat-room-image:latest 
    command: gunicorn --access-logfile - --workers 5 --bind 0.0.0.0:8000 mysite.wsgi:application    
    volumes:
      - static_volume:${STATIC_DIR}
    ports:
      - 8000:8000
    depends_on:
      - db      
      - celery
      - websockets
    
  db:
    image: postgres:latest
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

  nginx:
    build: ./nginx
    volumes:
      - static_volume:${STATIC_DIR}
    ports:
      - 80:80
      - 443:443
    depends_on:
      - web

  redis:
    image: "redis:latest" 
    

volumes:
  postgres_data:
  static_volume: